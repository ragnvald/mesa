# In general - Do not make changes to the configuration file.
# Changes could lead to the program not working as expected.

[DEFAULT]
input_folder_asset              = input/asset
input_folder_geocode            = input/geocode
input_folder_lines              = input/lines
input_folder_atlas              = input/atlas
input_folder_evaluate_landuse   = input/evaluate_landuse
input_folder_images             = input/images
output_folder                   = output/
gpkg_file                       = output/mesa.gpkg
mosaic_coverage_union           = true

mesa_version                    = 5.0.1

# OpenAI-key used for intellingent processing
openai_api_key_file             = secrets/openai.key

# Asset lines and points minimum buffer as we do not relate to arealess features.
default_line_buffer_m           = 30
default_point_buffer_m          = 30

# MBtileset zoom levels. This defines the zoom levels for which tiles will be 
# generated. The higher the zoom level, the more detailed the tiles will be, but
# also the larger the file size. Processing time and storage requirements will
# increase with higher zoom levels.
tiles_minzoom                   = 6
tiles_maxzoom                   = 13

# Performance knobs
# These settings influence speed, memory use, and how often the UI/log gets updates
# during heavy processing (intersections, tiling, etc.). Typical errors which indicate
# memory issues (e.g., "bad allocation" or similar) can often be resolved by lowering
# the geocode_soft_limit and asset_soft_limit values.
#
# Notes:
# - Smaller limits typically reduce peak memory, but can increase overhead and runtime.
# - More frequent progress/heartbeat updates can make the UI feel more responsive, but
#   may slow processing slightly.
# - If you are unsure: keep defaults.
#
#
# Worker processes for CPU-side parallel work: 0=auto. Final worker count is still capped by RAM budget (see approx_gb_per_worker/mem_target_frac) and CPU count.
# Capped at 4 after the 140+ GB peak-RSS event on this M4 Max box - the
# auto-sized 14-16 worker pool over a dataset with one 664 MB tbl_stacked
# partition pushed the host into swap-death. Raise only after measuring
# peak per-worker RSS on a representative project.
max_workers                     = 0   ; 0 = auto-tune from hardware + data (was 4)
# Cap for H3 generation: if estimated H3 cells for the AOI exceed this, H3 levels are skipped to avoid extreme time/RAM use.
h3_max_cells                    = 20000000

# --- Flatten-stage safety knobs ---
# The "Build tbl_flat" stage loads an entire tbl_stacked partition into a
# worker process and runs several pandas groupby/merge/sort passes. Peak RAM
# per worker can be many times the raw partition size, and partition size is
# heavily skewed (a handful of very large ones), so capping flatten workers
# by CPU count alone can blow through total RAM.
#
# flatten_max_workers: hard cap for the LARGE-partition phase of flatten.
# 0 = auto (RAM-budget math). Set a small number (2-3) on memory-constrained
# hosts or after seeing "bad allocation" / OOM crashes during flatten. This
# cap only applies to partitions >= flatten_large_partition_mb in size.
flatten_max_workers             = 0   ; 0 = auto-tune (was 2)

# flatten_small_max_workers: hard cap for the SMALL-partition phase of flatten.
# Small partitions don't trigger pandas groupby/merge ballooning, so this can
# and should be much higher (typically near CPU count). 0 = auto.
# Pinned at 4 to match the global 4-worker safety cap; raise when we have
# evidence that observed per-worker RSS in the small phase stays well under
# the budget on the largest project this host runs.
flatten_small_max_workers       = 0   ; 0 = auto-tune (was 4)

# Disk-size threshold (MB) used to split partitions into "large" and "small"
# phases. A handful of >50 MB partitions typically dominate memory; everything
# below runs with wide parallelism. Same value works on macOS and Windows.
flatten_large_partition_mb      = 50

# Disk-size threshold (MB) above which a partition is treated as HUGE and
# run strictly serially in its own phase, regardless of flatten_max_workers.
# Each huge partition can peak at 50-100 GB during pandas groupby/merge.
flatten_huge_partition_mb       = 0   ; 0 = auto-tune from RAM (was 200)
# Minimum cell area (m^2) kept in tbl_flat. Cells below this are dropped as
# slivers (precision artifacts from polygonising asset edges). Set to 0 to
# disable the cutoff entirely; the UI checkbox can disable it per-run.
flatten_sliver_min_area_m2      = 1.0
# Pre-flight refusal thresholds for flatten. If host RAM use or swap is
# already above these limits when flatten starts, the stage aborts cleanly
# instead of entering swap-death.
flatten_preflight_max_vm_percent = 60
flatten_preflight_max_swap_gb    = 5.0
# Per-worker RAM estimate used when flatten_max_workers=0. Defaults to roughly
# 3x approx_gb_per_worker because flatten workers hold whole partitions rather
# than bounded Stage 2 chunks. Raise this if you still see flatten OOMs.
flatten_approx_gb_per_worker    = 14.0
# backfill_max_workers: hard cap for the post-flatten backfill of area_m2
# into tbl_stacked partitions. This phase is I/O-bound and pandas-merge-light,
# so it can run with far more parallelism than flatten. 0 = auto. Safe to
# raise on Windows/Linux hosts with many cores and ample RAM.
# Pinned at 4 to match the global 4-worker safety cap.
backfill_max_workers            = 0
# tiles_max_workers: hard cap for the MBTiles raster generation stage. Each
# worker holds a pickled copy of the current group's geometry list, so RAM
# scales with both workers and group size. 0 = auto (CPU/2 clipped by RAM
# budget). Raise on Windows/Linux hosts with lots of RAM and many cores.
# Pinned at 4 to match the global 4-worker safety cap.
tiles_max_workers               = 0   ; 0 = auto-tune (was 4)
# Per-worker RAM estimate for tiles generation, used when tiles_max_workers=0.
tiles_approx_gb_per_worker      = 3.0
# Stage 2 (tbl_stacked) worker count is capped using
#   max(approx_gb_per_worker, data_gb * stage2_worker_overhead_multiplier).
# The default 1.5 covers the worst case: each worker holds full assets +
# geocodes plus spatial index buffers, and an sjoin against a dense asset
# region can multiply geocode rows several-fold inside a single chunk. We
# briefly tried 1.0 on this M4 Max (5 GB observed vs 5.6 GB data) and it
# produced a 140+ GB peak-RSS swap stall on a large project, because
# psutil's "available" reading on Apple Silicon stays optimistic right up
# until the OS starts paging. The code now floors this at 1.0 regardless;
# leave at 1.5 unless you have measured peak worker RSS and have headroom.
stage2_worker_overhead_multiplier = 1.5

# Memory panic watchdog. If RAM use crosses mem_panic_percent and stays
# there for mem_panic_grace_secs, the active multiprocessing pool (Stage 2
# intersect, flatten-large, flatten-small, or backfill) is terminated and
# the run aborts cleanly with an error. Catches the case where the
# pre-flight worker estimate underestimates a particular chunk's join or
# pandas-merge expansion, before macOS unified memory falls into
# swap-death. 75 % matches the operator-set ceiling on this host.
mem_panic_percent              = 75
mem_panic_grace_secs           = 10
# Process-lifetime sentinel watchdog. Hard-exits the parent when sustained
# RAM pressure exceeds the threshold; complements the per-pool watchdog
# above by covering parent-side work between pools. See learning.md
# "Parent-side memory in the pipeline" for the failure mode this catches.
mem_lifetime_panic_percent     = 90
mem_lifetime_panic_grace_secs  = 5

# -------------------------------------------------------------------------
# Basic mosaic (basic_mosaic) performance knobs
# These only affect the “Create geocodes (H3 / Mosaic)” mosaic build.
#
# Key idea:
# - The slow phase is "Parallel boundary extraction". If CPU looks low near the
#   end, it is often because only a few heavy chunks remain ("straggler tail").
#   Use task ordering + smaller chunk sizes to keep workers busy.

# Force mosaic generation to run single-process.
# - false: use multiprocessing when mosaic_workers > 1 (default)
# - true: force workers=1 (lower peak RAM; slower)
mosaic_force_serial             = false

# Number of worker processes for mosaic boundary extraction.
# - 0: auto-size based on CPU and available RAM (default)
# - N>0: fixed number of worker processes
mosaic_workers                  = 0

# Auto worker sizing (only used when mosaic_workers = 0)
# - fraction: fraction of detected CPUs to consider
mosaic_auto_worker_fraction     = 0.75
# - min: minimum workers when auto-sizing
mosaic_auto_worker_min          = 1
# - max: 0 means no explicit upper bound (still capped by RAM); otherwise cap workers
mosaic_auto_worker_max          = 0
# - mem_gb: approximate GB per worker used for RAM-based capping
mosaic_auto_worker_mem_gb       = 1.5

# Enable multiprocessing for boundary extraction.
# - true: use multiprocessing pool (default)
# - false: always run extraction serially (easier debugging; slower)
mosaic_parallel_extract         = true

# Chunk size for parallel boundary extraction.
# - Larger: less overhead, but worse load balancing (can create a slow tail)
# - Smaller: better load balancing, but more overhead
mosaic_extract_chunk_size       = 250

# Task ordering for parallel chunks (reduces end-of-run stalls).
# - interleave: mix light/heavy chunks for steadier progress (default)
# - heavy_first: run heaviest chunks first
# - light_first: run lightest chunks first
mosaic_task_order               = heavy_first

# Pool dispatch chunk size for imap_unordered (NOT the same as mosaic_extract_chunk_size).
# - 1: most responsive/steady (default)
# - >1: lower overhead but can worsen load balance
mosaic_extract_pool_chunksize   = 1

# Restart each worker after N tasks (limits memory growth; too small adds overhead).
# - 0/empty is not allowed; use >= 1
# - Typical: 10–50 on Windows for large projects
mosaic_extract_maxtasksperchild = 20

# Advanced (leave defaults unless tuning)
# Batch sizes for union reduction stages.
mosaic_line_union_batch         = 4000
mosaic_line_union_max_partials  = 64
mosaic_coverage_union_batch     = 4000

# Flush polygonize output to disk every N faces (reduces peak RAM).
mosaic_faces_flush_batch        = 250000

# Tile grid for parallel mosaic tiling (off = disabled; e.g. 3x3 = 3×3 grid of tiles ).
mosaic_tile_grid                = 3x3

# Overlap between adjacent tiles in metres (avoids boundary artefacts when tiling is on).
mosaic_tile_overlap_m           = 10

# Compatibility note:
# Older configs used mosaic_pool_maxtasksperchild / mosaic_pool_chunksize.
# Newer builds prefer mosaic_extract_maxtasksperchild / mosaic_extract_pool_chunksize.
# Both are accepted; keep only one set to avoid confusion.

# -------------------------------------------------------------------------
# Processing (data_process) performance knobs
# These settings affect the main processing pipeline (intersections, chunking,
# flattening, and related heavy steps run by tools\data_process.exe).

# Update progress/UI every N tiles (smaller = more updates, slightly slower)
tiles_progress_every            = 1000
# If a chunk contains more than this many geocodes, processing will split work to keep memory stable
geocode_soft_limit              = 420
# If a chunk contains more than this many assets, processing will split work to keep memory stable
asset_soft_limit                = 100000
# Estimated RAM use per worker (GB). Higher value => fewer workers chosen when max_workers=0
approx_gb_per_worker            = 6.0
# Fraction of available RAM to treat as usable budget when auto-sizing work (0.0-1.0)
# Apple Silicon uses unified memory (GPU + CPU share RAM). 0.70 is the safe
# default when other apps share the machine; 0.85 was tried during the
# Apple Silicon tuning pass but produced a 140+ GB peak-RSS swap stall on
# a large project (psutil's "available" stays optimistic on unified memory
# right up until the OS pages out). Back to 0.70 to keep peak under the
# 75 % mem_panic_percent ceiling.
mem_target_frac                 = 0.85
# Seconds between “still working” pings in long-running operations (smaller = more frequent logs)
heartbeat_secs                  = 60
# Base processing chunk size (feature count). Smaller reduces peak memory but increases overhead/runtime.
chunk_size                      = 22000
# Spatial grid cell size used when partitioning work. Smaller can reduce peak memory (more partitions) but may run slower.
cell_size                       = 10000

# Basemap provider for report maps:
# - xyz (default): Use MESA's built-in OSM XYZ downloader with persistent cache under output/tile_cache
# - contextily: Use contextily (if installed); no tiles stored under output/tile_cache
# - auto: Prefer contextily, fall back to xyz
report_basemap_mode             = xyz

# Inset styling for report maps (context insets, overview insets)
report_inset_border_color       = #1f1f1f
report_inset_border_lw          = 1.2
report_inset_shadow_alpha       = 0.18
report_inset_shadow_dx          = 0.006
report_inset_shadow_dy          = 0.008

# Default sizes for atlases
atlas_lon_size_km               = 100
atlas_lat_size_km               = 100
atlas_overlap_percent           = 10

# Default segment sizes for line segmentation
segment_width                   = 600
segment_length                  = 1000

# Projection used to calculate areas and distances.
area_projection_epsg            = 3035
# Projection used for working calculations (e.g., buffering, intersections)
working_projection_epsg         = 4326
# Projection used for output data
output_projection_epsg          = 4326


auto_workers_min               = 1
auto_workers_max               = 8
target_geocodes_per_chunk      = 4200
chunk_backlog_multiplier       = 3.5
chunk_cells_min                = 2
chunk_cells_max                = 72
chunk_overshoot_factor         = 1.15
